{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <h2>用户注册</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" class="login-form" id="registerForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username"
                   value="{{ username or '' }}" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email"
                   value="{{ email or '' }}" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone"
                   value="{{ phone or '' }}" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
    </form>
    <p style="margin-top: 16px; text-align: center; font-size: 13px; color: #888;">
        已有账号？
        <a href="/login" style="color: #667eea; font-weight: 600;">去登录</a>
    </p>
</div>

<script>
// SHA-256 哈希函数（用于密码传输加密）
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// 表单提交时对密码进行 SHA-256 哈希
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    const pwField = document.getElementById('password');
    if (pwField.value) {
        pwField.value = await sha256(pwField.value);
    }
});
</script>
{% endblock %}
