{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <h2>用户注册</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" class="login-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username"
                   value="{{ username or '' }}" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
            <ul style="font-size: 12px; color: #888; margin-top: 6px; padding-left: 16px; list-style: disc;">
                <li>至少8个字符</li>
                <li>包含大写字母</li>
                <li>包含小写字母</li>
                <li>包含数字</li>
                <li>包含特殊符号（如 @ # $ % 等）</li>
            </ul>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email"
                   value="{{ email or '' }}" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone"
                   value="{{ phone or '' }}" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
    </form>
    <p style="margin-top: 16px; text-align: center; font-size: 13px; color: #888;">
        已有账号？
        <a href="/login" style="color: #667eea; font-weight: 600;">去登录</a>
    </p>
</div>
{% endblock %}
