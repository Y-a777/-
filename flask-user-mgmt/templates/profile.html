{% extends "base.html" %}

{% block content %}
{% if error %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="error-message">{{ error }}</div>
    <div style="text-align: center; margin-top: 15px;">
        <a href="/" class="btn btn-primary">返回首页</a>
    </div>
</div>
{% endif %}

{% if user %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>个人中心</h2>
    <div class="user-info">
        <ul class="info-list">
            <li><span class="info-label">ID：</span>{{ user.id }}</li>
            <li><span class="info-label">用户名：</span>{{ user.username }}</li>
            <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
            <li><span class="info-label">手机：</span>{{ user.phone }}</li>
            <li><span class="info-label">余额：</span>{{ user.balance }}</li>
        </ul>
    </div>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>充值</h2>
    <form method="POST" action="/recharge" class="recharge-form">
        <input type="hidden" name="user_id" value="{{ user.id }}">
        <div class="form-group">
            <label for="amount">充值金额</label>
            <input type="number" id="amount" name="amount" step="0.01"
                   placeholder="请输入充值金额" required>
        </div>
        <button type="submit" class="btn btn-primary">充 值</button>
    </form>
</div>
{% endif %}
{% endblock %}
